  - "https://github.com/viahlgre/pytorch/commit/f0374f296279f6fbdb3437a144b226521d00b788.patch"
#
torch_pip_dependencies:
  - mkl-include
  - mkl-static
  - ninja
  - numpy
  - packaging
  - pyyaml
  - requests
  - setuptools
  - six
  - typing_extensions
#
torch_apt_dependencies:
  - ccache
  - cmake
  - libjpeg-dev
  - libopenblas-dev
  - libpng-dev
  - numactl
#
pytorch_triton_url: "https://download.pytorch.org/whl/triton_rocm-3.6.0-cp312-cp312-linux_x86_64.whl"
